<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Duration & Medication - Symptom Sense AI</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.4.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

<div class="container-box">

    <h2 class="section-title">
        <i class="ri-time-line"></i> Duration & Medication
    </h2>

    <form action="/result" method="POST" class="form-box">

        <!-- Hidden fields from previous page -->
        <input type="hidden" name="age" value="{{ age }}">
        <input type="hidden" name="gender" value="{{ gender }}">
        <input type="hidden" name="symptoms" value="{{ symptoms }}">

        <label>How long have you had these symptoms?</label>
        <select name="duration" required>
            <option value="" disabled selected>Select duration</option>
            <option value="<24h">Less than 24 hours</option>
            <option value="1-3d">1 - 3 Days</option>
            <option value="4-7d">4 - 7 Days</option>
            <option value="1-2w">1 - 2 Weeks</option>
            <option value=">2w">More than 2 Weeks</option>
        </select>

        <label>Did you take medication without consulting a doctor?</label>
        <select name="medication_taken" id="medTakenSelect" required>
            <option value="" disabled selected>Select option</option>
            <option value="no">No</option>
            <option value="yes">Yes</option>
        </select>

        <div id="improveSection" style="display:none;">
            <label>Did your symptoms improve?</label>
            <select name="improvement">
                <option value="no_change">No Change</option>
                <option value="improved">Improved</option>
                <option value="worsened">Worsened</option>
            </select>
        </div>

        <button type="submit" class="primary-btn" style="margin-top:14px;">
            Get Assessment →
        </button>

    </form>

    <p class="footer-note-small" onclick="window.location.href='/user'">← Back</p>

</div>

<script>
document.getElementById("medTakenSelect").addEventListener("change", function () {
    document.getElementById("improveSection").style.display =
        this.value === "yes" ? "block" : "none";
});
</script>

</body>
</html>
